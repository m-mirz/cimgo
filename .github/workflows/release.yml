name: Build Release Assets

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build cimcli Binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v5
      with:
        submodules: recursive

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Install protocol buffer compiler
      run: |
        sudo apt-get install -y protobuf-compiler
    
    - name: Install Tools
      run: |
        go install google.golang.org/protobuf/cmd/protoc-gen-go
        echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

    - name: Generate code
      run: go generate ./...

    - name: Build Linux
      run: |
        GOOS=linux GOARCH=amd64 go build -o cimcli-linux-amd64 ./cmd/cimcli

    - name: Build Windows
      run: |
        GOOS=windows GOARCH=amd64 go build -o cimcli-windows-amd64.exe ./cmd/cimcli

    - name: Build macOS (amd64)
      run: |
        GOOS=darwin GOARCH=amd64 go build -o cimcli-darwin-amd64 ./cmd/cimcli

    - name: Build macOS (arm64)
      run: |
        GOOS=darwin GOARCH=arm64 go build -o cimcli-darwin-arm64 ./cmd/cimcli

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: cimcli-binaries
        path: |
          cimcli-linux-amd64
          cimcli-windows-amd64.exe
          cimcli-darwin-amd64
          cimcli-darwin-arm64

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release create "${{ github.ref_name }}" \
          --title "Release ${{ github.ref_name }}" \
          --generate-notes \
          cimcli-linux-amd64 \
          cimcli-windows-amd64.exe \
          cimcli-darwin-amd64 \
          cimcli-darwin-arm64
